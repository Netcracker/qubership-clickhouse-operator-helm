# Default values for ClickHouse-services 
# This is a YAML-formatted file
# Declare variables to be passed into your templates.

## Set of affinities that will be applied to all of the pods.
# Type: object
# Mandatory: no
#
affinity: {}

global:
  cloudIntegrationEnabled: true

## Set of the labels that will be applied to all of the pods.
# Type: object
# Mandatory: no
#
podLabels: {}
#  custom: label1

clickhouseOperator:

  ## Provide a name in place of clickhouse-operator for ServiceAccount
  # Type: string
  # Mandatory: no
  #
  serviceAccountName: clickhouse-operator


clickhouseCluster:
  users:
    clickhouse:
      profile: default
      password: clickhouse
      networks/ip: "::/0"
# Template ServiceMonitor for DR
  serviceMonitor: false
  shardsCount: 1


backupDaemon:
  ## Enable clickhouse-cluster installation with specific scheme
  # Type: string
  # Mandatory: no
  install: yes
  timeout: "10"

  storage:
    remote: "none"  
    # nfs:
    #   imageSidecar: ghcr.io/netcracker/qubership-clickhouse-backup-sidecar:main
    #   resources:
    #     limits:
    #       cpu: 100m
    #       memory: 256Mi
    #     requests:
    #       cpu: 100m
    #       memory: 256Mi
    #   pvSize: 5Gi
    #   storageClassName: local-path
    #   matchLabels:
    #     labelkey: label_value

    # s3:
    #   access_key: minio
    #   bucket: click-backups
    #   endpoint: https://minio-service
    #   secret_key: minio123
    #   debug: true
    #   disable_ssl: true
    #   acl: private
    #   force_path_style: true

  orchestrator:

    image: ghcr.io/netcracker/qubership-clickhouse-backup-orchestrator:main
    resources:
      limits:
        cpu: 500m
        memory: 512Mi
      requests:
        cpu: 250m
        memory: 256Mi

    ## PVs size for ClickHouse data and logs
    # Type: string
    # Mandatory: no
    #
    pvSize: 2Gi

    ## A claim can request a particular class by specifying the name of a StorageClass.
    ## Ref: https://kubernetes.io/docs/concepts/storage/persistent-volumes/
    # Type: string
    # Mandatory: no
    #
#    storageClassName: local-path

#    volumeName: ""
    nodeSelector: {}
#      key: value

    accessModes:
      - ReadWriteOnce

    envs:
      STORAGE_EXTERNAL: "/backup-storage-external/"
      BACKUP_SCHEDULE: "0 * * * *"
      EVICTION_POLICY: "7d/7d,1y/delete"
      PUBLISH_CUSTOM_VARS: "false"
      ENABLE_INCREMENTAL: "true"
      INC_BACKUP_SCHEDULE: "None"
      ALLOW_PREFIX: "true"

    securityContext:
      container: {}
      pod: {}
      ## Container level security attributes
      # Type: object
      # Mandatory: no
      #
#      runAsUser: 101

      ## The GID to run the entrypoint of the container process.
      # Defaults to group specified in image metadata if unspecified.
      # Type: integer
      # Mandatory: no
#      runAsGroup: 101
#    backupDaemonApiCredentialsUsername: ""
#    backupDaemonApiCredentialsPassword: ""



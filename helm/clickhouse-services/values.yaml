dbaas:
  # Optional flag for Clickhouse DBaaS Adapter deployment
  install: false
  # Docker Image that will be used for Clickhouse DBaaS Adapter container
  dockerImage: ghcr.io/netcracker/qubership-clickhouse-dbaas-adapter:main
  podLabels: {}
  # Clickhouse cluster entry point.
  #  chHost: clickhouse-cluster
  # Allows to override database name to be connected by default
  # dbName: system
  # DBaaS Aggregator Section
  aggregator:
    # The address of the aggregator where the adapter registers its physical database cluster.
    registrationAddress: "http://dbaas-aggregator.dbaas:8080"
    # Username for database registration.
    registrationUsername: "cluster-dba"
    # Password for database registration.
    registrationPassword: "bNMQ5567_1p"
    # physicalDatabaseIdentifier: "clickhouse"
  labels:
    clusterName: "clickhouse"
  clickhouse:
    username: "nc_dbaas_user"
    password: "pAssW0RD1"
  adapter:
    username: "dbaas-aggregator"
    password: "dbaas-aggregator"
#    address: "dbaas-aggregator" http://nc-dbaas-clickhouse-adapter.%s:8080" .Release.Namespace
  # Resource limits for Clickhouse DBaaS Adapter Pod
  resources:
    limits:
      cpu: 200m
      memory: 32Mi
    requests:
      cpu: 200m
      memory: 32Mi
  securityContext:
    pod: {}
    container: {}
#  priorityClassName: "high-priority"

tls:
  enabled: false
  zookeeper: false
  certificates:
    ca_crt:
    tls_key:
    tls_crt:
  certificateSecretName: ch-cert
  generateCerts:
    clusterIssuerName: ""
    enabled: false
    duration: 365
    subjectAlternativeName:
      additionalDnsNames: [ ]
      additionalIpAddresses: [ ]

tracing:
  enabled: false
  host: "jaeger-collector.tracing.svc:4317"
  service: "nc-clickhouse-backup-daemon"

integrationTests:
  install: false
  image: "ghcr.io/netcracker/qubership-clickhouse-integration-tests:main"
  tags: "backupORdbaas"
  clickhouseHost: "clickhouse-cluster"
  clickhousePort: 8123
  credentials:
    clickhouse:
      user: "clickhouse"
  clickhouseBackupHost: "clickhouse-backup-orchestrator"
  clickhouseBackupPort: 8080
  resources:
    requests:
      memory: 256Mi
      cpu: 200m
    limits:
      memory: 256Mi
      cpu: 400m
  securityContext:
    pod: { }
    container: { }
  timeoutBeforeStart: 30
  affinity: {}


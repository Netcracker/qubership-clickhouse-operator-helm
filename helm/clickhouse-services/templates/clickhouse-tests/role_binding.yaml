{{- if .Values.integrationTests.install }}
kind: RoleBinding
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: clickhouse-integration-tests
  labels:
    name: clickhouse-integration-tests
    {{ include "kubernetes.labels" . | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: clickhouse-integration-tests
roleRef:
  kind: Role
  name: clickhouse-integration-tests
  apiGroup: rbac.authorization.k8s.io
{{- end }}

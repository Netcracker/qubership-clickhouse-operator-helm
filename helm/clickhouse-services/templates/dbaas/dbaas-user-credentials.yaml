{{- if .Values.dbaas.install }}
apiVersion: v1
kind: Secret
metadata:
  labels:
    app: nc-dbaas-clickhouse-adapter
    name: nc-dbaas-user-credentials
    {{ include "kubernetes.labels" . | nindent 4 }}
  name: nc-dbaas-user-credentials
data:
  username: {{ default "user" .Values.dbaas.clickhouse.username | b64enc }}
  password: {{ default "paSSw0rd" .Values.dbaas.clickhouse.password | b64enc }}
type: Opaque
{{- end }}
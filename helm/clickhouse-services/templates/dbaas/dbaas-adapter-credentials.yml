{{ if .Values.dbaas.install }}
apiVersion: v1
kind: Secret
metadata:
  labels:
    app: nc-dbaas-clickhouse-adapter
    name: nc-dbaas-adapter-credentials
    {{ include "kubernetes.labels" . | nindent 4 }}
  name: nc-dbaas-adapter-credentials
data:
  {{- if .Values.dbaas.adapter }}
  username: {{ default "user" .Values.dbaas.adapter.username | b64enc }}
  password: {{ default "paSSw0rd" .Values.dbaas.adapter.password | b64enc }}
  {{- else }}
  username: {{ "user" | b64enc }}
  password: {{ "paSSw0rd" | b64enc }}
{{- end }}
type: Opaque
{{ end }}
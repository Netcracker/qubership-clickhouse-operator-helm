{{- if and .Values.tls.enabled .Values.tls.generateCerts.enabled (not (.Values.tls.generateCerts.clusterIssuerName)) }}
apiVersion: cert-manager.io/v1
kind: Issuer
metadata:
  name: clickhouse-tls-issuer
  labels:
    name: clickhouse-tls-issuer
    {{ include "kubernetes.labels" . | nindent 4 }}
spec:
  selfSigned: {}
{{- end }}
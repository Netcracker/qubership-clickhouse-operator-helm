{{- if and .Values.clickhouseOperator.role.install }}
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ .Values.clickhouseOperator.name }}
  labels:
    name: {{ .Values.clickhouseOperator.name }}
    {{ include "kubernetes.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ .Values.clickhouseOperator.name }}
subjects:
  - kind: ServiceAccount
    name: {{ .Values.clickhouseOperator.serviceAccountName }}
    namespace: {{ .Release.Namespace }}
{{- end }}
{{- if and (.Capabilities.APIVersions.Has "gateway.networking.k8s.io/v1") (eq .Values.PAAS_PLATFORM "KUBERNETES") -}}
{{- if and .Values.clickhouseCluster.install .Values.tls.enabled .Values.clickhouseCluster.ingressHttp -}}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: http-frontend-redirect-clickhouse
  labels:
    name: http-frontend-redirect-clickhouse
    {{ include "kubernetes.labels" . | nindent 4 }}
spec:
  parentRefs:
  - name: {{ include "clickhouse.gateway.name" . }}
    namespace: {{ include "clickhouse.gateway.namespace" . }}
    port: 80
  hostnames: [{{ .Values.clickhouseCluster.ingressHttp.host | quote }}]
  rules:
  - filters:
    - type: RequestRedirect
      requestRedirect:
        scheme: https
        statusCode: 301
{{- end }}
{{- end }}

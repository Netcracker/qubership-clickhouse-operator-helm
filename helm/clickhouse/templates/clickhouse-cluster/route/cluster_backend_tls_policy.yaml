{{- if and (.Capabilities.APIVersions.Has "gateway.networking.k8s.io/v1") .Values.clickhouseCluster.install .Values.tls.enabled .Values.clickhouseCluster.httpRoute }}
apiVersion: gateway.networking.k8s.io/v1
kind: BackendTLSPolicy
metadata:
  name: backend-tls-policy-clickhouse
  labels:
    name: backend-tls-policy-clickhouse
    {{ include "kubernetes.labels" . | nindent 4 }}
spec:
  targetRefs:
  - group: ""
    kind: Service
    name: clickhouse-{{ .Values.clickhouseCluster.name }}
  validation:
    hostname: {{ printf "clickhouse-cluster.%s" .Release.Namespace | quote }}
    caCertificateRefs:
    - group: ""
      kind: Secret
      name: {{ .Values.tls.certificateSecretName }}
{{- end }}

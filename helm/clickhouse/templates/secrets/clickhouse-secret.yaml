{{- range $userName, $userSpec := .Values.clickhouseCluster.users }}
apiVersion: v1
kind: Secret
metadata:
  labels:
    app: clickhouse
    automation.infra/secret-change: "true"
    name: {{ $userName }}-credentials
    app.kubernetes.io/component: clickhouse-operator
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: clickhouse
    app.kubernetes.io/part-of: clickhouse-operator
    app.kubernetes.io/instance: clickhouse
    app.kubernetes.io/version: 0.17.0
    app.kubernetes.io/technology: "go"
  name: {{ $userName }}-credentials
data:
{{- range $specName, $specValue := $userSpec }}
{{ if eq $specName "password" }}
  password: {{ $specValue | b64enc }}
{{ end }}
{{- end }}
  clickhouse_user: {{ $userName | b64enc }}
type: Opaque
---
{{- end }}
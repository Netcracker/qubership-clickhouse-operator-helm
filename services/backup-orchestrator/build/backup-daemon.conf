{
command = "/usr/local/bin/clickhouse-backup-orchestrator --action backup --backupPath {{.data_folder}} {{.dbs}}"
restore_command = "/usr/local/bin/clickhouse-backup-orchestrator --action restore --backupPath {{.data_folder}} {{.dbs}} {{.dbmap}} {{.dropsrcdb}}"
evict_command = "/usr/local/bin/clickhouse-backup-orchestrator --action delete --backupPath {{.data_folder}}"
list_instances_in_vault_command = "/usr/local/bin/clickhouse-backup-orchestrator --action dblist --backupPath {{.data_folder}}"
#  INCREMENTAL BACKUP
incremental_command = "/usr/local/bin/clickhouse-backup-orchestrator --action incremental-backup --backupPath {{.data_folder}}"
incremental_restore_command = "/usr/local/bin/clickhouse-backup-orchestrator --action restore --backupPath {{.data_folder}}"
incremental_evict_command ="/usr/local/bin/clickhouse-backup-orchestrator --action incrementalDelete --backupPath {{.data_folder}}"
incremental_list_instances_in_vault_command = "/usr/local/bin/clickhouse-backup-orchestrator --action dblist --backupPath {{.data_folder}}"
}
{
    enable_full_restore = true
    command = /usr/local/bin/clickhouse-backup-orchestrator --action backup --backupPath "%(data_folder)s" "%(dbs)s"
    restore_command = /usr/local/bin/clickhouse-backup-orchestrator --action restore --backupPath "%(data_folder)s" "%(dbs)s" "%(dbmap)s" "%(dropsrcdb)s"
    evict_command = /usr/local/bin/clickhouse-backup-orchestrator --action delete --backupPath "%(data_folder)s"
    termination_command = /usr/local/bin/clickhouse-backup-orchestrator --action cancel --backupPath "%(data_folder)s"
    list_instances_in_vault_command = /usr/local/bin/clickhouse-backup-orchestrator --action dblist --backupPath "%(data_folder)s"
    incremental_list_instances_in_vault_command = /usr/local/bin/clickhouse-backup-orchestrator --action dblist --backupPath "%(data_folder)s"

    incremental_command = /usr/local/bin/clickhouse-backup-orchestrator --action incremental-backup --backupPath "%(data_folder)s"
    incremental_evict_command = /usr/local/bin/clickhouse-backup-orchestrator --action incrementalDelete --backupPath "%(data_folder)s"
    incremental_restore_command = /usr/local/bin/clickhouse-backup-orchestrator --action restore --backupPath "%(data_folder)s"

    custom_vars = [{region: ${?MODE}},"dropsrcdb"]
    publish_custom_vars = ${?PUBLISH_CUSTOM_VARS}
    s3_ssl_verify = ${?S3_SSL_VERIFY}
    allow_prefix = ${?ALLOW_PREFIX}
    log {
        level: DEBUG
        level: ${?LOG_LEVEL}

        # Log format that should satisfy generic NC logging format
        format: "[%(asctime)s][%(levelname)s][class=%(name)s][thread=%(thread)d] %(message)s"
        # Date format in ISO8601
        datefmt: "%Y-%m-%dT%H:%M:%S%z"
      }

}